<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <defs>
    <!-- leaf gradients: outer leaves darker, inner lighter -->
    <linearGradient id="lf1" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#0d4a1f"/>
      <stop offset="100%" stop-color="#1d7a38"/>
    </linearGradient>
    <linearGradient id="lf2" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#156030"/>
      <stop offset="100%" stop-color="#29964a"/>
    </linearGradient>
    <linearGradient id="lf3" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#1c7a3c"/>
      <stop offset="100%" stop-color="#3ab85e"/>
    </linearGradient>
    <linearGradient id="lf4" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#25954a"/>
      <stop offset="100%" stop-color="#55d47a"/>
    </linearGradient>
    <linearGradient id="lf5" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#2fb05a"/>
      <stop offset="100%" stop-color="#7de89a"/>
    </linearGradient>
    <!-- stem -->
    <linearGradient id="stem" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a3d977"/>
      <stop offset="100%" stop-color="#6ab04c"/>
    </linearGradient>
  </defs>

  <!--
    Head of romaine-style lettuce viewed from slight front-above.
    Five overlapping leaf "fans" fanning from a shared base, each rotated
    around the base point (50, 100). The outermost pair is drawn first
    (behind) and innermost last (in front). Each leaf is a rounded
    teardrop with a wavy/lobed upper edge.
  -->

  <!-- Stem/base -->
  <path d="M44,100 C44,105 44,110 44,115 C44,117 47,118 50,118 C53,118 56,117 56,115 C56,110 56,105 56,100Z"
        fill="url(#stem)"/>

  <!-- ── Leaf 1 – far left (behind everything) ── -->
  <path transform="rotate(-38,50,100)"
        d="M50,100
           C44,94 35,85 28,72
           C22,60 20,46 22,34
           C24,22 30,13 36,8
           C40,5 45,4 50,4
           C55,4 60,5 64,8
           C70,13 76,22 78,34
           C80,46 78,60 72,72
           C65,85 56,94 50,100Z"
        fill="url(#lf1)"/>
  <!-- vein 1 -->
  <path transform="rotate(-38,50,100)"
        d="M50,98 C50,72 50,40 50,6"
        stroke="#0a3318" stroke-width="1.2" fill="none" opacity="0.55"/>

  <!-- ── Leaf 2 – second from left ── -->
  <path transform="rotate(-19,50,100)"
        d="M50,100
           C44,94 35,85 28,72
           C22,60 20,46 22,34
           C24,22 30,13 36,8
           C40,5 45,4 50,4
           C55,4 60,5 64,8
           C70,13 76,22 78,34
           C80,46 78,60 72,72
           C65,85 56,94 50,100Z"
        fill="url(#lf2)"/>
  <path transform="rotate(-19,50,100)"
        d="M50,98 C50,72 50,40 50,6"
        stroke="#0f4020" stroke-width="1.2" fill="none" opacity="0.5"/>
  <!-- side veins -->
  <path transform="rotate(-19,50,100)"
        d="M50,65 C44,55 34,48 28,42 M50,50 C56,40 66,33 72,28"
        stroke="#0f4020" stroke-width="0.8" fill="none" opacity="0.35"/>

  <!-- ── Leaf 3 – centre (in front of outer pair, behind inner) ── -->
  <path d="M50,100
           C44,94 34,84 27,70
           C21,58 19,44 21,32
           C23,20 29,11 36,7
           C40,4 45,3 50,3
           C55,3 60,4 64,7
           C71,11 77,20 79,32
           C81,44 79,58 73,70
           C66,84 56,94 50,100Z"
        fill="url(#lf3)"/>
  <!-- centre main vein -->
  <path d="M50,98 C50,70 50,38 50,5"
        stroke="#145528" stroke-width="1.3" fill="none" opacity="0.55"/>
  <!-- side veins centre leaf -->
  <path d="M50,70 C43,60 33,52 26,46
           M50,55 C57,45 67,37 74,31
           M50,40 C44,32 37,26 32,20
           M50,40 C56,32 63,26 68,20"
        stroke="#145528" stroke-width="0.75" fill="none" opacity="0.35"/>

  <!-- ── Leaf 4 – second from right ── -->
  <path transform="rotate(19,50,100)"
        d="M50,100
           C44,94 35,85 28,72
           C22,60 20,46 22,34
           C24,22 30,13 36,8
           C40,5 45,4 50,4
           C55,4 60,5 64,8
           C70,13 76,22 78,34
           C80,46 78,60 72,72
           C65,85 56,94 50,100Z"
        fill="url(#lf4)"/>
  <path transform="rotate(19,50,100)"
        d="M50,98 C50,72 50,40 50,6"
        stroke="#196040" stroke-width="1.2" fill="none" opacity="0.5"/>
  <path transform="rotate(19,50,100)"
        d="M50,65 C44,55 34,48 28,42 M50,50 C56,40 66,33 72,28"
        stroke="#196040" stroke-width="0.8" fill="none" opacity="0.35"/>

  <!-- ── Leaf 5 – far right (frontmost) ── -->
  <path transform="rotate(38,50,100)"
        d="M50,100
           C44,94 35,85 28,72
           C22,60 20,46 22,34
           C24,22 30,13 36,8
           C40,5 45,4 50,4
           C55,4 60,5 64,8
           C70,13 76,22 78,34
           C80,46 78,60 72,72
           C65,85 56,94 50,100Z"
        fill="url(#lf5)"/>
  <path transform="rotate(38,50,100)"
        d="M50,98 C50,72 50,40 50,6"
        stroke="#1e7a46" stroke-width="1.2" fill="none" opacity="0.5"/>

  <!-- Highlight on centre leaf tip -->
  <ellipse cx="50" cy="14" rx="8" ry="5" fill="white" opacity="0.08"/>
</svg>
