<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bgG" cx="45%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#0c2e17"/>
      <stop offset="100%" stop-color="#040e08"/>
    </radialGradient>
    <radialGradient id="l1G" cx="75%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1c6b32"/>
      <stop offset="100%" stop-color="#0d3a1b"/>
    </radialGradient>
    <radialGradient id="l2G" cx="75%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#28924a"/>
      <stop offset="100%" stop-color="#145228"/>
    </radialGradient>
    <radialGradient id="l3G" cx="75%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#3ab85e"/>
      <stop offset="100%" stop-color="#1e7a38"/>
    </radialGradient>
    <radialGradient id="l4G" cx="75%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#5dd87c"/>
      <stop offset="100%" stop-color="#2aa04e"/>
    </radialGradient>
  </defs>

  <!-- Background disc -->
  <circle cx="50" cy="50" r="49" fill="url(#bgG)"/>
  <!-- Subtle rim -->
  <circle cx="50" cy="50" r="48.5" fill="none" stroke="#1a5c2a" stroke-width="0.8" opacity="0.5"/>

  <!-- Layer 1 — 6 large outer leaves, darkest -->
  <g fill="url(#l1G)">
    <path d="M50,50 C57,33 80,31 90,50 C80,69 57,67 50,50Z" transform="rotate(0,50,50)"/>
    <path d="M50,50 C57,33 80,31 90,50 C80,69 57,67 50,50Z" transform="rotate(60,50,50)"/>
    <path d="M50,50 C57,33 80,31 90,50 C80,69 57,67 50,50Z" transform="rotate(120,50,50)"/>
    <path d="M50,50 C57,33 80,31 90,50 C80,69 57,67 50,50Z" transform="rotate(180,50,50)"/>
    <path d="M50,50 C57,33 80,31 90,50 C80,69 57,67 50,50Z" transform="rotate(240,50,50)"/>
    <path d="M50,50 C57,33 80,31 90,50 C80,69 57,67 50,50Z" transform="rotate(300,50,50)"/>
  </g>
  <!-- Veins layer 1 -->
  <g stroke="#0d3d1a" stroke-width="0.7" fill="none" opacity="0.6">
    <line x1="51" y1="50" x2="89" y2="50" transform="rotate(0,50,50)"/>
    <line x1="51" y1="50" x2="89" y2="50" transform="rotate(60,50,50)"/>
    <line x1="51" y1="50" x2="89" y2="50" transform="rotate(120,50,50)"/>
    <line x1="51" y1="50" x2="89" y2="50" transform="rotate(180,50,50)"/>
    <line x1="51" y1="50" x2="89" y2="50" transform="rotate(240,50,50)"/>
    <line x1="51" y1="50" x2="89" y2="50" transform="rotate(300,50,50)"/>
  </g>

  <!-- Layer 2 — 6 leaves rotated 30°, medium-dark -->
  <g fill="url(#l2G)">
    <path d="M50,50 C56,36 77,34 85,50 C77,66 56,64 50,50Z" transform="rotate(30,50,50)"/>
    <path d="M50,50 C56,36 77,34 85,50 C77,66 56,64 50,50Z" transform="rotate(90,50,50)"/>
    <path d="M50,50 C56,36 77,34 85,50 C77,66 56,64 50,50Z" transform="rotate(150,50,50)"/>
    <path d="M50,50 C56,36 77,34 85,50 C77,66 56,64 50,50Z" transform="rotate(210,50,50)"/>
    <path d="M50,50 C56,36 77,34 85,50 C77,66 56,64 50,50Z" transform="rotate(270,50,50)"/>
    <path d="M50,50 C56,36 77,34 85,50 C77,66 56,64 50,50Z" transform="rotate(330,50,50)"/>
  </g>
  <!-- Veins layer 2 -->
  <g stroke="#165a28" stroke-width="0.6" fill="none" opacity="0.5">
    <line x1="51" y1="50" x2="84" y2="50" transform="rotate(30,50,50)"/>
    <line x1="51" y1="50" x2="84" y2="50" transform="rotate(90,50,50)"/>
    <line x1="51" y1="50" x2="84" y2="50" transform="rotate(150,50,50)"/>
    <line x1="51" y1="50" x2="84" y2="50" transform="rotate(210,50,50)"/>
    <line x1="51" y1="50" x2="84" y2="50" transform="rotate(270,50,50)"/>
    <line x1="51" y1="50" x2="84" y2="50" transform="rotate(330,50,50)"/>
  </g>

  <!-- Layer 3 — 5 inner leaves, brighter -->
  <g fill="url(#l3G)">
    <path d="M50,50 C54,39 72,38 78,50 C72,62 54,61 50,50Z" transform="rotate(18,50,50)"/>
    <path d="M50,50 C54,39 72,38 78,50 C72,62 54,61 50,50Z" transform="rotate(90,50,50)"/>
    <path d="M50,50 C54,39 72,38 78,50 C72,62 54,61 50,50Z" transform="rotate(162,50,50)"/>
    <path d="M50,50 C54,39 72,38 78,50 C72,62 54,61 50,50Z" transform="rotate(234,50,50)"/>
    <path d="M50,50 C54,39 72,38 78,50 C72,62 54,61 50,50Z" transform="rotate(306,50,50)"/>
  </g>

  <!-- Layer 4 — 4 innermost leaves, lightest green -->
  <g fill="url(#l4G)">
    <path d="M50,50 C53,43 65,42 70,50 C65,58 53,57 50,50Z" transform="rotate(0,50,50)"/>
    <path d="M50,50 C53,43 65,42 70,50 C65,58 53,57 50,50Z" transform="rotate(90,50,50)"/>
    <path d="M50,50 C53,43 65,42 70,50 C65,58 53,57 50,50Z" transform="rotate(180,50,50)"/>
    <path d="M50,50 C53,43 65,42 70,50 C65,58 53,57 50,50Z" transform="rotate(270,50,50)"/>
  </g>

  <!-- Centre bud — concentric circles, very light -->
  <circle cx="50" cy="50" r="9"   fill="#4ade80"/>
  <circle cx="50" cy="50" r="6.5" fill="#6ee88a"/>
  <circle cx="50" cy="50" r="4.5" fill="#86efac"/>
  <circle cx="50" cy="50" r="2.8" fill="#a7f3bc"/>
  <circle cx="50" cy="50" r="1.4" fill="#d1fae5"/>
</svg>
