apiVersion: v1
kind: Service
metadata:
  name: embedding-sidecar-service
  namespace: lettucecache
  labels:
    app.kubernetes.io/name: lettucecache
    app.kubernetes.io/component: embedding-sidecar
spec:
  selector:
    app: embedding-sidecar
  ports:
