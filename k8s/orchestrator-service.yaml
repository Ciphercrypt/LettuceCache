apiVersion: v1
kind: Service
metadata:
  name: lettucecache-orchestrator-service
  namespace: lettucecache
  labels:
    app.kubernetes.io/name: lettucecache
    app.kubernetes.io/component: orchestrator
spec:
  selector:
    app: lettucecache-orchestrator
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
